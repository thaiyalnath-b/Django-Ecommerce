<style>
    #carouselExample {
        .carousel-inner {
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .carousel-item {
            position: relative;

            &::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            img {
                transition: transform 8s ease;
                filter: brightness(1.05);
            }

            &.active img {
                transform: scale(1.05);
            }
        }

        .carousel-caption {
            position: absolute;
            bottom: 4rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            padding: 2.5rem 3rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            width: auto;
            min-width: 450px;
            animation: slideUp 0.8s ease-out, floatGlow 4s ease-in-out infinite;

            h5 {
                font-size: 2.8rem;
                font-weight: 800;
                color: #ffffff;
                margin-bottom: 0.6rem;
                text-shadow: 2px 4px 20px rgba(0, 0, 0, 0.5);
                letter-spacing: -1px;
                font-family: 'Playfair Display', 'Poppins', serif;
                line-height: 1.2;
            }

            p {
                font-size: 1.1rem;
                color: rgba(255, 255, 255, 0.95);
                margin-bottom: 1.5rem;
                text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
                font-weight: 400;
                letter-spacing: 0.5px;
                font-family: 'Inter', sans-serif;
                max-width: 500px;
            }

            .btn {
                background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
                font-size: 1rem;
                font-weight: 600;
                padding: 0.9rem 2.8rem;
                border-radius: 50px;
                color: #0a0a0f;
                border: none;
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
                transition: var(--transition-smooth);
                text-transform: uppercase;
                letter-spacing: 1.5px;
                font-family: 'Poppins', sans-serif;
                position: relative;
                overflow: hidden;

                &::before {
                    content: '';
                    position: absolute;
                    top: 0;
                    left: -100%;
                    width: 100%;
                    height: 100%;
                    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
                    transition: left 0.6s ease;
                }

                &:hover {
                    background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
                    transform: translateY(-5px) scale(1.03);
                    box-shadow: 0 30px 40px rgba(0, 0, 0, 0.4);

                    &::before {
                        left: 100%;
                    }
                }

                &:active {
                    transform: translateY(-2px) scale(1.01);
                }
            }
        }

        .carousel-indicators {
            bottom: 2rem;
            gap: 1rem;
            margin-bottom: 0;

            button {
                width: 40px;
                height: 4px;
                border-radius: 4px;
                background: rgba(255, 255, 255, 0.4);
                border: none;
                transition: all 0.4s ease;
                margin: 0;

                &.active {
                    background: linear-gradient(90deg, #ffffff, var(--accent-gold));
                    width: 60px;
                    box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
                }

                &:hover {
                    background: #ffffff;
                    width: 50px;
                }
            }
        }

        .carousel-control-prev,
        .carousel-control-next {
            width: 6%;
            opacity: 0;
            transition: all 0.5s ease;

            &-icon {
                filter: invert(1);
                width: 3.5rem;
                height: 3.5rem;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border-radius: 50%;
                padding: 1.2rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
                transition: all 0.4s ease;
            }

            &:hover {
                opacity: 1;

                &-icon {
                    background: rgba(255, 255, 255, 0.2);
                    transform: scale(1.15);
                    border-color: rgba(255, 255, 255, 0.4);
                }
            }
        }

        &:hover {

            .carousel-control-prev,
            .carousel-control-next {
                opacity: 0.9;
            }
        }
    }

    @media (max-width: 992px) {
        #carouselExample .carousel-caption {
            min-width: 350px;
            padding: 2rem;

            h5 {
                font-size: 2.2rem;
            }
        }
    }

    @media (max-width: 768px) {
        #carouselExample {
            .carousel-item {
                height: 450px;
            }

            .carousel-caption {
                bottom: 1.5rem;
                padding: 1.5rem 1.8rem;
                min-width: 300px;

                h5 {
                    font-size: 1.8rem;
                }

                p {
                    font-size: 0.95rem;
                }

                .btn {
                    font-size: 0.9rem;
                    padding: 0.7rem 2rem;
                }
            }

            .carousel-indicators {
                bottom: 1rem;

                button {
                    width: 30px;
                    height: 3px;

                    &.active {
                        width: 45px;
                    }
                }
            }
        }
    }

    @media (max-width: 576px) {
        #carouselExample {
            .carousel-caption {
                min-width: 260px;
                padding: 1.2rem;

                h5 {
                    font-size: 1.5rem;
                }

                p {
                    font-size: 0.85rem;
                }

                .btn {
                    font-size: 0.8rem;
                    padding: 0.6rem 1.5rem;
                }
            }
        }
    }
</style>

<div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">

    <div class="carousel-inner">
        {% for carousel_image in carousel_images %}
        <div class="carousel-item caritem {% if forloop.first %}active{% endif %}">
            <a href="{% url 'products' %}">
                <img src="{{ carousel_image.img.url }}" class="d-block w-100" alt="{{ carousel_image.title }}">
            </a>


        </div>
        {% endfor %}
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>

</div>
